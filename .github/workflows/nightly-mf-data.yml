name: Nightly MF Data Build

on:
  schedule:
    # 11:00 PM IST = 17:30 UTC  (AMFI/mfapi updates by ~9 PM IST)
    - cron: '30 17 * * 1-5'
  workflow_dispatch:   # allow manual trigger from GitHub UI anytime

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30   # script usually finishes in 8-15 min; hard-kill at 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run compute script
        run: node scripts/compute-mf-scores.js
        # If mfapi.in is down, the script exits 1 and the step fails.
        # The PREVIOUS mf-data.json (last successful run) stays in the repo,
        # so the app keeps working — it just shows yesterday's data.

      - name: Verify output file exists and is non-empty
        run: |
          if [ ! -s output/mf-data.json ]; then
            echo "ERROR: output/mf-data.json is missing or empty"
            exit 1
          fi
          SIZE=$(wc -c < output/mf-data.json)
          echo "Output size: ${SIZE} bytes"
          # Sanity: reject if suspiciously small (< 100 KB = something went wrong)
          if [ "$SIZE" -lt 102400 ]; then
            echo "ERROR: output file too small — likely a partial fetch"
            exit 1
          fi

      - name: Commit and push mf-data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/mf-data.json
          # Only commit if something actually changed
          git diff --staged --quiet || git commit -m "chore: nightly MF data update $(date -u '+%Y-%m-%d')"
          git push
