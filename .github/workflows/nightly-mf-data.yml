name: Nightly MF Data Build

on:
  schedule:
    # 11:00 PM IST = 17:30 UTC  (AMFI/mfapi updates by ~9 PM IST)
    - cron: '30 17 * * 1-5'
  workflow_dispatch:   # allow manual trigger from GitHub UI anytime

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30   # script usually finishes in 8-15 min; hard-kill at 30
    permissions:
      contents: write     # needed for git push back to repo
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run compute script
        run: node scripts/compute-mf-scores.js
        # Writes to public/mf-data.json.
        # If mfapi.in is down, the script exits 1 and the step fails.
        # The PREVIOUS public/mf-data.json (last successful run) stays in the repo,
        # so the live app keeps serving yesterday's data automatically.

      - name: Verify output file exists and is non-empty
        run: |
          if [ ! -s public/mf-data.json ]; then
            echo "ERROR: public/mf-data.json is missing or empty"
            exit 1
          fi
          SIZE=$(wc -c < public/mf-data.json)
          echo "Output size: ${SIZE} bytes"
          # Sanity: reject if suspiciously small (< 100 KB = something went wrong)
          if [ "$SIZE" -lt 102400 ]; then
            echo "ERROR: output file too small — likely a partial fetch"
            exit 1
          fi
          # Print the generated timestamp from the JSON for the run log
          node -e "const d=require('./public/mf-data.json'); console.log('Generated:', d.generated, '| Funds:', d.fundCount);"

      - name: Commit and push mf-data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/mf-data.json
          # Only commit if something actually changed
          git diff --staged --quiet || git commit -m "chore: nightly MF data update $(date -u '+%Y-%m-%d')"
          git push

      - name: Deploy to Firebase Hosting
        # Deploys the updated public/mf-data.json (and any other public/ changes) to Firebase CDN.
        # Requires FIREBASE_TOKEN secret — generate with: firebase login:ci
        # Then add it to: GitHub repo → Settings → Secrets → Actions → FIREBASE_TOKEN
        if: env.FIREBASE_TOKEN != ''
        run: |
          npm install -g firebase-tools
          firebase deploy --only hosting --token "$FIREBASE_TOKEN" --non-interactive

      - name: Notify on failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "❌ Nightly MF Data Build Failed — ${{ github.run_id }}"
          to: arugula.vamsi@gmail.com
          from: AishwaryaMasthu Bot <${{ secrets.MAIL_USERNAME }}>
          body: |
            The nightly MF data build failed on ${{ github.run_number == 0 && 'manual trigger' || github.event.schedule }}.

            Run:    ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}

            Check the run log above for the failed step. The live app is still
            serving the previous mf-data.json until the next successful build.
