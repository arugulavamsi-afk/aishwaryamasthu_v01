<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YieldCalc - Advanced Financial Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .tab-active { border-bottom: 2px solid #10b981; color: #10b981; font-weight: 600; }
        .tab-inactive { color: #64748b; font-weight: 500; }
        .tab-inactive:hover { color: #334155; }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen">

    <nav class="bg-white border-b border-slate-200 px-6 py-4 flex items-center">
        <div class="flex items-center gap-2 text-xl font-bold text-slate-900">
            <div class="w-8 h-8 bg-emerald-100 text-emerald-600 rounded flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M4 4a2 2 0 00-2 2v4a2 2 0 002 2V6h10a2 2 0 00-2-2H4zm2 6a2 2 0 012-2h8a2 2 0 012 2v4a2 2 0 01-2 2H8a2 2 0 01-2-2v-4zm6 4a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd" />
                </svg>
            </div>
            Yield<span class="text-emerald-500">Calc</span>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-10">
        <div class="mb-8 max-w-2xl">
            <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight text-slate-900 mb-4">
                Plan your financial <span class="text-emerald-400">future</span>
            </h1>
            <p class="text-lg text-slate-500">
                Calculate wealth growth or work backwards from your goals to find out exactly how much you need to invest.
            </p>
        </div>

        <div class="flex space-x-8 border-b border-slate-200 mb-8">
            <button onclick="switchMode('growth')" id="tab-growth" class="pb-3 px-1 tab-active transition-colors">
                Growth Calculator
            </button>
            <button onclick="switchMode('goal')" id="tab-goal" class="pb-3 px-1 tab-inactive transition-colors">
                Goal Planner
            </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 h-fit">
                <h2 class="text-xl font-semibold flex items-center gap-2 mb-6" id="params-title">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M11 11V9a2 2 0 00-2-2m2 4v4a2 2 0 104 0v-1m-4-3H9m2 0h4m6 1a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    Parameters
                </h2>

                <div class="space-y-5" id="input-area">
                    
                    <div id="type-container">
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Investment Type</label>
                        <select id="inv-type" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 font-medium appearance-none">
                            <option value="lumpsum">Lumpsum (One-time)</option>
                            <option value="sip">SIP (Monthly)</option>
                            <option value="yearly">Yearly Payments</option>
                        </select>
                    </div>

                    <div>
                        <label id="amount-label" class="block text-sm font-semibold text-slate-700 mb-2">Investment Amount</label>
                        <div class="relative">
                            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">₹</span>
                            <input type="number" id="amount" value="10000" class="w-full pl-8 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition-all font-medium">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Expected Annual Return</label>
                        <div class="relative">
                            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">%</span>
                            <input type="number" id="rate" value="12" step="0.1" class="w-full pl-8 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition-all font-medium">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Time Period (Years)</label>
                        <div class="relative">
                            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                                </svg>
                            </span>
                            <input type="number" id="years" value="10" class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition-all font-medium">
                        </div>
                    </div>

                    <button onclick="calculate()" id="calc-btn" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-semibold py-3.5 rounded-xl transition-colors flex items-center justify-center gap-2 mt-4">
                        Calculate Projection
                    </button>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-6">
                
                <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100">
                    <h3 id="result-title" class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-2">Projected Future Value</h3>
                    <div id="main-result" class="text-5xl md:text-6xl font-extrabold text-slate-900 mb-8 break-words">₹0</div>
                    
                    <div id="secondary-results" class="grid grid-cols-2 gap-4 border-t border-slate-100 pt-6">
                        <div>
                            <p id="sec-label-1" class="text-sm text-slate-500 font-medium mb-1">Total Interest</p>
                            <p id="sec-val-1" class="text-xl font-bold text-emerald-500 flex items-center gap-1">₹0</p>
                        </div>
                        <div>
                            <p id="sec-label-2" class="text-sm text-slate-500 font-medium mb-1">Total Contributions</p>
                            <p id="sec-val-2" class="text-xl font-bold text-slate-900">₹0</p>
                        </div>
                    </div>
                </div>

                <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100">
                    <h3 class="text-xl font-bold text-slate-900 mb-1">Growth Trajectory</h3>
                    <p id="chart-subtitle" class="text-slate-500 text-sm mb-6">Visualizing wealth accumulation.</p>
                    <div class="relative h-64 w-full">
                        <canvas id="growthChart"></canvas>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script>
        let growthChartInstance = null;
        let currentMode = 'growth'; // 'growth' or 'goal'

        const formatCurrency = (amount) => {
            return new Intl.NumberFormat('en-IN', {
                style: 'currency', currency: 'INR', maximumFractionDigits: 0
            }).format(amount);
        };

        function switchMode(mode) {
            currentMode = mode;
            const tabGrowth = document.getElementById('tab-growth');
            const tabGoal = document.getElementById('tab-goal');
            const typeContainer = document.getElementById('type-container');
            const amountLabel = document.getElementById('amount-label');
            const calcBtn = document.getElementById('calc-btn');

            if (mode === 'growth') {
                tabGrowth.className = 'pb-3 px-1 tab-active transition-colors';
                tabGoal.className = 'pb-3 px-1 tab-inactive transition-colors';
                typeContainer.style.display = 'block';
                amountLabel.innerText = 'Investment Amount';
                calcBtn.innerText = 'Calculate Projection';
                document.getElementById('amount').value = 10000;
            } else {
                tabGoal.className = 'pb-3 px-1 tab-active transition-colors';
                tabGrowth.className = 'pb-3 px-1 tab-inactive transition-colors';
                typeContainer.style.display = 'none';
                amountLabel.innerText = 'Target Goal Amount';
                calcBtn.innerText = 'Calculate Required Investment';
                document.getElementById('amount').value = 1000000; // 10 Lakh default
            }
            calculate();
        }

        function calculate() {
            const amount = parseFloat(document.getElementById('amount').value);
            const rate = parseFloat(document.getElementById('rate').value);
            const years = parseInt(document.getElementById('years').value);

            if (isNaN(amount) || isNaN(rate) || isNaN(years) || amount <= 0 || years <= 0) return;

            if (currentMode === 'growth') {
                calculateGrowth(amount, rate, years);
            } else {
                calculateGoal(amount, rate, years);
            }
        }

        function calculateGrowth(amount, rate, years) {
            const type = document.getElementById('inv-type').value;
            const r = rate / 100;
            let futureValue = 0, totalContributions = 0;
            const labels = [], dataInvested = [], dataValue = [];

            if (type === 'lumpsum') {
                futureValue = amount * Math.pow((1 + r), years);
                totalContributions = amount;
                for(let i=0; i<=years; i++) {
                    labels.push(`Yr ${i}`);
                    dataInvested.push(amount);
                    dataValue.push(amount * Math.pow((1 + r), i));
                }
            } 
            else if (type === 'sip') {
                const i = r / 12; // monthly rate
                const months = years * 12;
                // FV of annuity due (investing at start of month)
                futureValue = amount * ((Math.pow(1 + i, months) - 1) / i) * (1 + i);
                totalContributions = amount * months;
                
                for(let y=0; y<=years; y++) {
                    labels.push(`Yr ${y}`);
                    dataInvested.push(amount * y * 12);
                    let valAtY = y === 0 ? 0 : amount * ((Math.pow(1 + i, y*12) - 1) / i) * (1 + i);
                    dataValue.push(valAtY);
                }
            }
            else if (type === 'yearly') {
                // FV of annuity due (investing at start of year)
                futureValue = amount * ((Math.pow(1 + r, years) - 1) / r) * (1 + r);
                totalContributions = amount * years;
                
                for(let y=0; y<=years; y++) {
                    labels.push(`Yr ${y}`);
                    dataInvested.push(amount * y);
                    let valAtY = y === 0 ? 0 : amount * ((Math.pow(1 + r, y) - 1) / r) * (1 + r);
                    dataValue.push(valAtY);
                }
            }

            const totalInterest = futureValue - totalContributions;

            // Update DOM
            document.getElementById('result-title').innerText = 'Projected Future Value';
            document.getElementById('main-result').innerText = formatCurrency(futureValue);
            document.getElementById('sec-label-1').innerText = 'Total Interest Gained';
            document.getElementById('sec-val-1').innerHTML = `<span class="text-emerald-500 font-bold">+${formatCurrency(totalInterest)}</span>`;
            document.getElementById('sec-label-2').innerText = 'Total Contributions';
            document.getElementById('sec-val-2').innerText = formatCurrency(totalContributions);
            document.getElementById('chart-subtitle').innerText = `Growth trajectory of a ${type} investment over ${years} years at ${rate}%.`;

            renderChart(labels, dataInvested, dataValue, 'Total Value', 'Amount Invested');
        }

        function calculateGoal(targetAmount, rate, years) {
            const r = rate / 100;
            const i = r / 12; // monthly rate
            const months = years * 12;

            // Math: PV = FV / (1+r)^t
            const reqLumpsum = targetAmount / Math.pow(1 + r, years);
            
            // Math: PMT = FV / [ (((1+i)^n - 1) / i) * (1+i) ]
            const reqSip = targetAmount / ( ((Math.pow(1 + i, months) - 1) / i) * (1 + i) );

            // Update DOM to show Goal outputs
            document.getElementById('result-title').innerText = 'To Reach Your Goal, You Need:';
            document.getElementById('main-result').innerHTML = `
                <div class="text-3xl text-slate-800">A Lumpsum of <span class="text-emerald-500 font-extrabold">${formatCurrency(reqLumpsum)}</span> today</div>
            `;
            
            document.getElementById('sec-label-1').innerText = 'OR alternatively...';
            document.getElementById('sec-val-1').innerHTML = `<span class="text-slate-900">A Monthly SIP of</span>`;
            
            document.getElementById('sec-label-2').innerText = 'Required SIP';
            document.getElementById('sec-val-2').innerHTML = `<span class="text-2xl text-emerald-500 font-bold">${formatCurrency(reqSip)}/mo</span>`;
            
            document.getElementById('chart-subtitle').innerText = `Trajectory comparison: Lumpsum vs SIP to reach ${formatCurrency(targetAmount)} in ${years} years.`;

            // Plotting the two different paths to the same target
            const labels = [], dataLumpsumPath = [], dataSipPath = [];
            for(let y=0; y<=years; y++) {
                labels.push(`Yr ${y}`);
                // Path of the required lumpsum
                dataLumpsumPath.push(reqLumpsum * Math.pow((1 + r), y));
                // Path of the required SIP
                let sipValAtY = y === 0 ? 0 : reqSip * ((Math.pow(1 + i, y*12) - 1) / i) * (1 + i);
                dataSipPath.push(sipValAtY);
            }

            renderChart(labels, dataLumpsumPath, dataSipPath, 'Lumpsum Path', 'SIP Path');
        }

        function renderChart(labels, dataset1, dataset2, label1, label2) {
            const ctx = document.getElementById('growthChart').getContext('2d');
            if (growthChartInstance) growthChartInstance.destroy();

            growthChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: currentMode === 'growth' ? label1 : label2, // The green fill line
                            data: currentMode === 'growth' ? dataset2 : dataset2,
                            borderColor: '#10b981', backgroundColor: 'rgba(16, 185, 129, 0.1)',
                            borderWidth: 3, fill: true, tension: 0.4, pointRadius: 0
                        },
                        {
                            label: currentMode === 'growth' ? label2 : label1, // The dashed line
                            data: currentMode === 'growth' ? dataset1 : dataset1,
                            borderColor: currentMode === 'growth' ? '#64748b' : '#3b82f6', // Slate for invested, Blue for Lumpsum path
                            borderWidth: 2, borderDash: [5, 5], fill: false, tension: 0.4, pointRadius: 0
                        }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: { legend: { display: true, position: 'bottom' } },
                    scales: {
                        y: {
                            beginAtZero: true, grid: { color: '#f1f5f9' },
                            ticks: { callback: (value) => '₹' + (value / 1000) + 'k', color: '#94a3b8' }
                        },
                        x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                    }
                }
            });
        }

        // Add event listeners to input fields to auto-calculate on change
        document.querySelectorAll('input, select').forEach(element => {
            element.addEventListener('input', calculate);
        });

        // Initialize
        window.onload = () => switchMode('growth');
    </script>
</body>
</html>
