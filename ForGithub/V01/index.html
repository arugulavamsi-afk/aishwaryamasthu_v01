<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aishwaryamasthu - An Indian calculator for your Wealth generation scenarios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .tab-active { border-bottom: 2px solid #10b981; color: #10b981; font-weight: 700; }
        .tab-inactive { color: #64748b; font-weight: 500; }
        .tab-inactive:hover { color: #334155; }
        .num-word { font-size: 0.65rem; color: #64748b; font-weight: 600; text-transform: capitalize; margin-top: 2px; }
        
        /* Hide scrollbars to enforce single view constraint */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-slate-800 antialiased h-screen w-screen overflow-hidden flex flex-col">

    <nav class="bg-white border-b border-slate-200 px-4 py-3 flex-none flex justify-between items-center z-10">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-emerald-100 text-emerald-600 rounded flex items-center justify-center flex-shrink-0">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M4 4a2 2 0 00-2 2v4a2 2 0 002 2V6h10a2 2 0 00-2-2H4zm2 6a2 2 0 012-2h8a2 2 0 012 2v4a2 2 0 01-2 2H8a2 2 0 01-2-2v-4zm6 4a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd" />
                </svg>
            </div>
            <div class="flex flex-col leading-tight">
                <span class="text-xl font-extrabold text-slate-900 tracking-tight">Aishwarya<span class="text-emerald-500">masthu</span></span>
                <span class="text-[10px] font-medium text-slate-400 tracking-wide">An Indian calculator for your Wealth generation scenarios</span>
            </div>
        </div>
        <div class="flex space-x-6">
            <button onclick="switchMode('growth')" id="tab-growth" class="pb-1 tab-active transition-colors text-sm">Growth Calculator</button>
            <button onclick="switchMode('inflation')" id="tab-inflation" class="pb-1 tab-inactive transition-colors text-sm">Inflation Adjusted</button>
            <button onclick="switchMode('goal')" id="tab-goal" class="pb-1 tab-inactive transition-colors text-sm">Goal Planner</button>
        </div>
    </nav>

    <main class="flex-1 w-full max-w-7xl mx-auto p-4 flex gap-4 overflow-hidden">
        
        <div class="w-1/3 bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex flex-col h-full overflow-y-auto no-scrollbar">
            <h2 class="text-lg font-bold flex items-center gap-2 mb-4 text-slate-800 shrink-0">Parameters</h2>

            <div class="space-y-4 flex-1">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Investment Type</label>
                    <select id="inv-type" class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-500 font-semibold text-sm outline-none">
                        <option value="lumpsum">Lumpsum (One-time)</option>
                        <option value="sip">SIP (Monthly)</option>
                        <option value="annually">Annually Once</option>
                    </select>
                </div>

                <div>
                    <label id="amount-label" class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Amount</label>
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 font-bold">₹</span>
                        <input type="text" id="amount" value="10,000" oninput="formatInput(this, 'amount-words')" class="w-full pl-8 pr-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-500 font-bold text-lg outline-none">
                    </div>
                    <div id="amount-words" class="num-word">Ten Thousand</div>
                </div>

                <div id="rate-container">
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Expected Return (%)</label>
                    <input type="number" id="rate" value="12" step="0.1" oninput="updateWords('rate', 'rate-words')" class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-500 font-bold text-lg outline-none">
                    <div class="num-word" id="rate-words">Twelve</div>
                </div>

                <div id="inflation-rate-container" class="hidden">
                    <label class="block text-xs font-bold text-rose-500 uppercase tracking-wider mb-1.5">Expected Inflation (%)</label>
                    <input type="number" id="inf-rate" value="6" step="0.1" oninput="updateWords('inf-rate', 'inf-rate-words')" class="w-full px-3 py-2.5 bg-rose-50 border border-rose-200 rounded-lg focus:ring-2 focus:ring-rose-500 font-bold text-lg outline-none text-rose-900">
                    <div class="num-word text-rose-400" id="inf-rate-words">Six</div>
                </div>

                <div id="custom-rate-container" class="hidden">
                    <label class="block text-xs font-bold text-indigo-500 uppercase tracking-wider mb-1.5">Custom Target Return (%) <span class="text-[10px] font-medium text-slate-400 lowercase">(Optional)</span></label>
                    <input type="number" id="custom-rate" placeholder="e.g. 14" step="0.1" oninput="updateWords('custom-rate', 'custom-rate-words')" class="w-full px-3 py-2.5 bg-indigo-50 border border-indigo-200 rounded-lg focus:ring-2 focus:ring-indigo-500 font-bold text-lg outline-none text-indigo-900">
                    <div class="num-word text-indigo-400" id="custom-rate-words"></div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Time Period (Years)</label>
                    <input type="number" id="years" value="10" oninput="updateWords('years', 'years-words')" class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-500 font-bold text-lg outline-none">
                    <div class="num-word" id="years-words">Ten</div>
                </div>
            </div>

            <button onclick="calculate()" id="calc-btn" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3.5 rounded-xl shadow-md transition-all active:scale-95 mt-4 shrink-0">
                Calculate Projection
            </button>
        </div>

        <div class="w-2/3 flex flex-col gap-4 min-w-0">
            
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 relative shrink-0">
                <div id="motivation" class="text-emerald-600 font-semibold text-xs mb-3 italic min-h-[1rem]">
                    </div>

                <div id="growth-results">
                    <h3 id="main-result-title" class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Projected Future Value</h3>
                    <div id="main-result" class="text-4xl lg:text-5xl font-black text-slate-900 truncate">₹0</div>
                    <div id="main-result-words" class="num-word">Zero</div>
                    
                    <div class="grid grid-cols-2 gap-4 border-t border-slate-100 mt-4 pt-4">
                        <div>
                            <p id="sec-label-1" class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-0.5">Total Interest</p>
                            <p id="sec-val-1" class="text-xl font-bold text-emerald-500 truncate">₹0</p>
                            <div id="sec-val-1-words" class="num-word">Zero</div>
                        </div>
                        <div>
                            <p id="sec-label-2" class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-0.5">Total Invested</p>
                            <p id="sec-val-2" class="text-xl font-bold text-slate-900 truncate">₹0</p>
                            <div id="sec-val-2-words" class="num-word">Zero</div>
                        </div>
                    </div>
                </div>

                <div id="goal-results" class="hidden">
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3" id="goal-subtitle">Required Investment to Reach Target</h3>
                    <div class="flex flex-wrap gap-3" id="goal-cards-container">
                        </div>
                </div>
            </div>

            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex-1 flex flex-col min-h-0">
                <h3 class="text-sm font-bold text-slate-800 mb-1" id="chart-title">Growth Trajectory</h3>
                <div class="relative flex-1 w-full min-h-0">
                    <canvas id="mainChart"></canvas>
                </div>
            </div>

        </div>
    </main>

    <script>
        let chartInstance = null;
        let currentMode = 'growth';

        // 100 Financial/Motivational Quotes
        const quotes = [
            "Compound interest is the eighth wonder of the world.", "Time is your greatest asset in investing.", "Patience is the key to building wealth.", "Invest in yourself first.", "The best time to plant a tree was 20 years ago. The second best time is now.",
            "Do not save what is left after spending, spend what is left after saving.", "Risk comes from not knowing what you are doing.", "Wealth consists not in having great possessions, but in having few wants.", "An investment in knowledge pays the best interest.", "Money is a terrible master but an excellent servant.",
            "Never depend on single income. Make investment to create a second source.", "Small disciplines repeated with consistency every day lead to great achievements.", "The stock market is a device for transferring money from the impatient to the patient.", "Financial peace isn't the acquisition of stuff. It's learning to live on less than you make.", "Opportunities come infrequently. When it rains gold, put out the bucket.",
            "Know what you own, and know why you own it.", "It’s not how much money you make, but how much money you keep.", "A penny saved is a penny earned.", "Every dollar you save is a step closer to financial freedom.", "Don't let your money sit idle; put it to work.",
            "Rich people acquire assets. The poor and middle class acquire liabilities.", "In investing, what is comfortable is rarely profitable.", "The individual investor should act consistently as an investor and not as a speculator.", "Wide diversification is only required when investors do not understand what they are doing.", "You get recessions, you have stock market declines. If you don't understand that's going to happen, then you're not ready.",
            "Behind every stock is a company. Find out what it's doing.", "Price is what you pay. Value is what you get.", "The biggest risk of all is not taking one.", "We don't have to be smarter than the rest. We have to be more disciplined.", "Investing should be more like watching paint dry or watching grass grow.",
            "Time in the market beats timing the market.", "Rule No. 1: Never lose money. Rule No. 2: Never forget Rule No. 1.", "Someone's sitting in the shade today because someone planted a tree a long time ago.", "Buy not on optimism, but on arithmetic.", "Minimizing downside risk while maximizing the upside is a powerful concept.",
            "If you aren't thinking about owning a stock for 10 years, don't even think about owning it for 10 minutes.", "The secret to wealth is simple: Find a way to do more for others than anyone else does.", "Money grows on the tree of persistence.", "The arithmetic makes it plain that inflation is a far more devastating tax than anything that has been enacted by our legislatures.", "Start small, think big, grow fast.",
            "A budget is telling your money where to go instead of wondering where it went.", "Beware of little expenses; a small leak will sink a great ship.", "The four most dangerous words in investing are: 'This time it's different.'", "Courage taught me no matter how bad a crisis gets ... any sound investment will eventually pay off.", "Invest for the long haul.",
            "Your net worth to the world is usually determined by what remains after your bad habits are subtracted from your good ones.", "The way to build wealth is to be a business owner.", "Don't look for the needle in the haystack. Just buy the haystack.", "Index funds are the sensible choice for the normal investor.", "Save blindly, invest wisely.",
            "A journey of a thousand miles begins with a single step.", "Wealth is the ability to fully experience life.", "The speed of your success is limited only by your dedication.", "Don't work for money; make it work for you.", "Failing to plan is planning to fail.",
            "If you buy things you do not need, soon you will have to sell things you need.", "Financial independence is paramount. My money works for me.", "To acquire money requires valor, to keep money requires prudence, and to spend money well is an art.", "Money is only a tool. It will take you wherever you wish, but it will not replace you as the driver.", "The lack of money is the root of all evil.",
            "Wealth flows from energy and ideas.", "Capital isn't scarce; vision is.", "Every day is a bank account, and time is our currency.", "Empty pockets never held anyone back. Only empty heads and empty hearts can do that.", "Formal education will make you a living; self-education will make you a fortune.",
            "Success is walking from failure to failure with no loss of enthusiasm.", "The best investment you can make is in your own abilities.", "Invest in your mind. It pays the best dividends.", "It's not about the money, it's about the freedom.", "To get rich, you have to be making money while you're asleep.",
            "Financial freedom is available to those who learn about it and work for it.", "You don't have to be a genius to invest well.", "Keep your eyes on the price, not the crowd.", "Simplicity is the ultimate sophistication in investing.", "If you want to be wealthy, think of saving as earning.",
            "Debt is a trap. Compounding is the key.", "Spend less than you earn. Invest the surplus. Avoid debt.", "Be fearful when others are greedy, and greedy when others are fearful.", "The secret of getting ahead is getting started.", "Discipline is the bridge between goals and accomplishment.",
            "Good habits formed at youth make all the difference.", "It takes as much energy to wish as it does to plan.", "Wealth is not his that has it, but his that enjoys it.", "Every time you borrow money, you're robbing your future self.", "A goal without a timeline is just a dream.",
            "Savings without a mission is garbage. Your money needs a job.", "Don't measure your wealth by money, but by things money can't buy.", "The more you learn, the more you earn.", "Action is the foundational key to all success.", "What gets measured gets managed.",
            "Stop buying things you don't need, to impress people you don't even like.", "It is not the man who has too little, but the man who craves more, that is poor.", "Don't let the fear of losing be greater than the excitement of winning.", "Never invest in a business you cannot understand.", "Your wealth is a measure of your options.",
            "Investing is a marathon, not a sprint.", "Focus on the process, not just the prize.", "Consistency is the DNA of financial success.", "Make your money your hardest working employee.", "Today's sacrifices are tomorrow's wealth."
        ];

        function numberToWords(num) {
            if (isNaN(num) || num === null || num === undefined) return '';
            if (num === 0) return 'Zero';
            if (num < 0) return 'Negative ' + numberToWords(Math.abs(num));
            
            const a = ['', 'One ', 'Two ', 'Three ', 'Four ', 'Five ', 'Six ', 'Seven ', 'Eight ', 'Nine ', 'Ten ', 'Eleven ', 'Twelve ', 'Thirteen ', 'Fourteen ', 'Fifteen ', 'Sixteen ', 'Seventeen ', 'Eighteen ', 'Nineteen '];
            const b = ['', '', 'Twenty', 'Thirty', 'Forty', 'Fifty', 'Sixty', 'Seventy', 'Eighty', 'Ninety'];
            
            function convertGroup(n) {
                let str = "";
                if (n > 99) { str += a[Math.floor(n / 100)] + "Hundred "; n %= 100; }
                if (n > 19) { str += b[Math.floor(n / 10)] + " "; n %= 10; }
                if (n > 0) { str += a[n]; }
                return str;
            }

            let res = "";
            let crore = Math.floor(num / 10000000); num %= 10000000;
            let lakh = Math.floor(num / 100000); num %= 100000;
            let thousand = Math.floor(num / 1000); num %= 1000;

            if (crore > 0) res += convertGroup(crore) + "Crore ";
            if (lakh > 0) res += convertGroup(lakh) + "Lakh ";
            if (thousand > 0) res += convertGroup(thousand) + "Thousand ";
            if (num > 0) res += convertGroup(num);
            
            return res.trim();
        }

        function formatInput(el, wordsId) {
            let val = el.value.replace(/[^0-9]/g, "");
            if (val === "") { 
                el.value = ""; 
                document.getElementById(wordsId).innerText = "Zero";
                return; 
            }
            let num = parseInt(val, 10);
            el.value = new Intl.NumberFormat('en-IN').format(num);
            document.getElementById(wordsId).innerText = numberToWords(num);
        }

        function updateWords(inputId, wordsId) {
            let val = parseFloat(document.getElementById(inputId).value);
            document.getElementById(wordsId).innerText = isNaN(val) ? "" : numberToWords(Math.round(val));
        }

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('tab-growth').className = mode === 'growth' ? 'pb-1 tab-active transition-colors text-sm' : 'pb-1 tab-inactive transition-colors text-sm';
            document.getElementById('tab-inflation').className = mode === 'inflation' ? 'pb-1 tab-active transition-colors text-sm' : 'pb-1 tab-inactive transition-colors text-sm';
            document.getElementById('tab-goal').className = mode === 'goal' ? 'pb-1 tab-active transition-colors text-sm' : 'pb-1 tab-inactive transition-colors text-sm';
            
            // Toggle Input Visibility
            document.getElementById('rate-container').style.display = mode === 'goal' ? 'none' : 'block';
            document.getElementById('inflation-rate-container').style.display = mode === 'inflation' ? 'block' : 'none';
            document.getElementById('custom-rate-container').style.display = mode === 'goal' ? 'block' : 'none';
            
            // Adjust Labels and Buttons
            document.getElementById('amount-label').innerText = mode === 'goal' ? 'Target Goal Amount (e.g. 1,00,00,000)' : 'Investment Amount';
            document.getElementById('calc-btn').innerText = mode === 'goal' ? 'Calculate Required Investment' : 'Calculate Projection';
            
            // Toggle Results Layout
            document.getElementById('growth-results').style.display = mode === 'goal' ? 'none' : 'block';
            document.getElementById('goal-results').style.display = mode === 'goal' ? 'block' : 'none';
            
            // Defaults per mode to guide the user
            if(mode === 'goal') {
                document.getElementById('amount').value = "1,00,00,000";
            } else {
                document.getElementById('amount').value = "10,000";
            }
            formatInput(document.getElementById('amount'), 'amount-words');
            
            calculate();
        }

        function calculate() {
            const randIndex = Math.floor(Math.random() * quotes.length);
            document.getElementById('motivation').innerText = `"${quotes[randIndex]}"`;

            const rawAmount = document.getElementById('amount').value.replace(/,/g, "");
            const amount = parseFloat(rawAmount) || 0;
            const years = parseInt(document.getElementById('years').value) || 0;
            const type = document.getElementById('inv-type').value;
            
            updateWords('years', 'years-words');

            if (currentMode === 'growth' || currentMode === 'inflation') {
                const rate = parseFloat(document.getElementById('rate').value) || 0;
                updateWords('rate', 'rate-words');
                calcGrowthOrInflation(amount, rate, years, type);
            } else {
                calcGoal(amount, years, type);
            }
        }

        // Handles both Growth and Inflation adjusting
        function calcGrowthOrInflation(amount, rate, years, type) {
            let fv = 0, invested = 0;
            const labels = [], dataGrowth = [], dataSecondary = [];
            const r = rate/100;
            const mRate = r/12;
            
            let infRate = 0;
            if(currentMode === 'inflation') {
                infRate = (parseFloat(document.getElementById('inf-rate').value) || 0) / 100;
            }

            for(let i=0; i<=years; i++) {
                labels.push("Yr " + i);
                let currentVal = 0;
                let prin = 0;

                if (type === 'sip') {
                    prin = amount * i * 12;
                    currentVal = i === 0 ? 0 : amount * ((Math.pow(1 + mRate, i * 12) - 1) / mRate) * (1 + mRate);
                } else if (type === 'annually') {
                    prin = amount * i;
                    currentVal = i === 0 ? 0 : amount * ((Math.pow(1 + r, i) - 1) / r) * (1 + r);
                } else {
                    prin = amount;
                    currentVal = amount * Math.pow(1 + r, i);
                }

                if(currentMode === 'inflation') {
                    // In inflation mode, dataGrowth is Real Value, dataSecondary is Nominal Value
                    let realVal = currentVal / Math.pow(1 + infRate, i);
                    dataGrowth.push(realVal);
                    dataSecondary.push(currentVal); // Nominal value for comparison line
                    if(i === years) { invested = prin; fv = realVal; }
                } else {
                    // In growth mode, dataGrowth is Total Value, dataSecondary is Principal Invested
                    dataGrowth.push(currentVal);
                    dataSecondary.push(prin);
                    if(i === years) { invested = prin; fv = currentVal; }
                }
            }

            const format = (val) => new Intl.NumberFormat('en-IN', {style: 'currency', currency: 'INR', maximumFractionDigits: 0}).format(val);
            
            document.getElementById('main-result').innerText = format(fv);
            document.getElementById('main-result-words').innerText = numberToWords(Math.round(fv));
            
            document.getElementById('sec-val-2').innerText = format(invested);
            document.getElementById('sec-val-2-words').innerText = numberToWords(Math.round(invested));

            if(currentMode === 'inflation') {
                document.getElementById('main-result-title').innerText = "Real Value (Purchasing Power)";
                document.getElementById('sec-label-1').innerText = "Nominal Value (Unadjusted)";
                let nominalFv = dataSecondary[dataSecondary.length - 1];
                document.getElementById('sec-val-1').innerText = format(nominalFv);
                document.getElementById('sec-val-1-words').innerText = numberToWords(Math.round(nominalFv));
                document.getElementById('sec-val-1').classList.replace('text-emerald-500', 'text-slate-500');
                
                document.getElementById('chart-title').innerText = "Purchasing Power vs Nominal Value";
                renderInteractiveLineChart(labels, dataGrowth, dataSecondary, "Real Value (Adjusted)", "Nominal Value", '#10b981', '#f43f5e');
            } else {
                document.getElementById('main-result-title').innerText = "Projected Future Value";
                document.getElementById('sec-label-1').innerText = "Total Interest";
                document.getElementById('sec-val-1').innerText = "+" + format(fv - invested);
                document.getElementById('sec-val-1-words').innerText = numberToWords(Math.round(fv - invested));
                document.getElementById('sec-val-1').classList.replace('text-slate-500', 'text-emerald-500');
                
                document.getElementById('chart-title').innerText = "Growth Trajectory";
                renderInteractiveLineChart(labels, dataGrowth, dataSecondary, "Total Value", "Amount Invested", '#10b981', '#64748b');
            }
        }

        // Logic for Goal Planner
        function calcGoal(target, years, type) {
            let ratesToCompare = [8, 10, 12, 15]; // Default market returns
            
            // Handle Custom Rate
            const rawCustomRate = document.getElementById('custom-rate').value;
            if (rawCustomRate !== "") {
                const customRate = parseFloat(rawCustomRate);
                if (!isNaN(customRate) && !ratesToCompare.includes(customRate)) {
                    ratesToCompare.unshift(customRate); // Put custom rate at the beginning
                    ratesToCompare.sort((a,b) => a - b); // Keep it ordered for the graph
                }
            }

            const container = document.getElementById('goal-cards-container');
            container.innerHTML = '';
            
            const format = (val) => new Intl.NumberFormat('en-IN', {style: 'currency', currency: 'INR', maximumFractionDigits: 0}).format(val);
            const periodText = type === 'sip' ? '/mo' : (type === 'annually' ? '/yr' : ' today');

            let barLabels = [];
            let barData = [];

            ratesToCompare.forEach(rate => {
                let required = 0;
                let r = rate/100;
                if(type === 'lumpsum') {
                    required = target / Math.pow(1 + r, years);
                } else if (type === 'sip') {
                    let i = r/12;
                    let n = years * 12;
                    required = target / ( ((Math.pow(1+i, n) - 1)/i) * (1+i) );
                } else if (type === 'annually') {
                    required = target / ( ((Math.pow(1+r, years) - 1)/r) * (1+r) );
                }

                barLabels.push(`${rate}% Return`);
                barData.push(required);

                // Highlight custom rate card if it exists
                const isCustom = rawCustomRate !== "" && parseFloat(rawCustomRate) === rate;
                const cardBorder = isCustom ? 'border-indigo-300 bg-indigo-50' : 'border-slate-200 bg-slate-50';
                const textCol = isCustom ? 'text-indigo-600' : 'text-emerald-600';

                const cardHTML = `
                    <div class="${cardBorder} border rounded-xl p-3 flex-1 min-w-[120px] flex flex-col justify-center">
                        <div class="text-[11px] font-bold text-slate-500 mb-1">If ${rate}% Return ${isCustom ? '(Custom)' : ''}</div>
                        <div class="text-lg font-black ${textCol}">${format(required)}<span class="text-[10px] font-semibold text-slate-500">${periodText}</span></div>
                        <div class="num-word mt-1">${numberToWords(Math.round(required))}</div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', cardHTML);
            });

            document.getElementById('goal-subtitle').innerText = `To reach ${format(target)} in ${years} Years via ${type.toUpperCase()}:`;
            document.getElementById('chart-title').innerText = "Required Investment vs Expected Return";
            renderInteractiveBarChart(barLabels, barData, type);
        }

        // Fully Interactive Line Chart
        function renderInteractiveLineChart(labels, dataPrimary, dataSecondary, labelPrimary, labelSecondary, colorPrimary, colorSecondary) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { 
                            label: labelPrimary, 
                            data: dataPrimary, 
                            borderColor: colorPrimary, 
                            backgroundColor: colorPrimary === '#10b981' ? 'rgba(16, 185, 129, 0.15)' : 'rgba(0,0,0,0)', 
                            fill: true, 
                            tension: 0.3, 
                            pointRadius: 2,
                            pointHoverRadius: 6
                        },
                        { 
                            label: labelSecondary, 
                            data: dataSecondary, 
                            borderColor: colorSecondary, 
                            borderDash: [5, 5], 
                            tension: 0, 
                            fill: false, 
                            pointRadius: 0,
                            pointHoverRadius: 5
                        }
                    ]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    plugins: { 
                        legend: { display: true, position: 'bottom', labels: { boxWidth: 12 } },
                        tooltip: {
                            backgroundColor: 'rgba(15, 23, 42, 0.9)',
                            titleFont: { size: 13, family: 'Inter' },
                            bodyFont: { size: 14, family: 'Inter', weight: 'bold' },
                            padding: 12,
                            callbacks: {
                                label: function(context) {
                                    let label = context.dataset.label || '';
                                    if (label) { label += ': '; }
                                    label += new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', maximumFractionDigits: 0 }).format(context.raw);
                                    return label;
                                }
                            }
                        }
                    },
                    scales: { 
                        y: { ticks: { callback: (val) => '₹' + (val/1000).toFixed(0) + 'k' } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        function renderInteractiveBarChart(labels, data, type) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();

            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: `Required ${type.toUpperCase()} Amount`,
                        data: data,
                        backgroundColor: '#34d399',
                        hoverBackgroundColor: '#10b981',
                        borderRadius: 6
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: { 
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(15, 23, 42, 0.9)',
                            titleFont: { size: 13, family: 'Inter' },
                            bodyFont: { size: 14, family: 'Inter', weight: 'bold' },
                            padding: 12,
                            callbacks: {
                                label: function(context) {
                                    return new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', maximumFractionDigits: 0 }).format(context.raw);
                                }
                            }
                        }
                    },
                    scales: { 
                        y: { ticks: { callback: (val) => '₹' + (val/1000).toFixed(0) + 'k' } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        // Initialization & Event Listeners
        window.onload = () => {
            formatInput(document.getElementById('amount'), 'amount-words');
            updateWords('rate', 'rate-words');
            updateWords('years', 'years-words');
            updateWords('inf-rate', 'inf-rate-words');
            calculate();
        };

        // Listen for standard updates on remaining fields
        ['rate', 'inf-rate', 'custom-rate'].forEach(id => {
            document.getElementById(id)?.addEventListener('input', calculate);
        });
        document.getElementById('inv-type').addEventListener('change', calculate);
    </script>
</body>
</html>
